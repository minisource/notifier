  /deliveries:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of deliveries (notifications) with optional
        filters. Filters are applied on the notification entity which serves as the
        delivery unit.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: pageSize
        type: integer
      - description: Filter by delivery status (pending, processing, sent, delivered,
          failed, retrying, dead, cancelled)
        in: query
        name: status
        type: string
      - description: Filter by channel (sms, email, push, in_app)
        in: query
        name: channel
        type: string
      - description: Filter by provider name
        in: query
        name: provider
        type: string
      - description: Filter by notification ID
        in: query
        name: notificationId
        type: string
      - description: Filter by user ID
        in: query
        name: userId
        type: string
      - description: Start date (RFC3339)
        in: query
        name: from
        type: string
      - description: End date (RFC3339)
        in: query
        name: to
        type: string
      - description: Search in subject/body/recipient
        in: query
        name: search
        type: string
      - default: created_at
        description: Sort field (created_at, updated_at, sent_at, priority, status)
        in: query
        name: sortBy
        type: string
      - default: desc
        description: Sort direction (asc, desc)
        in: query
        name: sortDirection
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List deliveries
      tags:
      - Deliveries
  /deliveries/{deliveryId}:
    get:
      consumes:
      - application/json
      description: Retrieve a specific delivery (notification) with its attempt history.
        Delivery ID is the same as the notification ID. Includes logs/attempts in
        the response.
      parameters:
      - description: Delivery ID (notification UUID)
        in: path
        name: deliveryId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeliveryResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get delivery by ID
      tags:
      - Deliveries
