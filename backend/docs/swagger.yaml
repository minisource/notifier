host: 127.0.0.1:9002
info:
  contact:
    email: support@minisource.com
    name: API Support
  description: Notification Service for Minisource - Handles Email, SMS, Push, and
    In-App notifications
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Notifier Service API
  version: "2.0"
paths:
  /admin/dashboard/overview:
    get:
      consumes:
      - application/json
      description: Retrieve the dashboard overview with key metrics — aggregated counts,
        channel/status breakdown, daily trend, recent failures. Admin/operator only.
        Data derived from notifications table.
      parameters:
      - description: 'Start date (RFC3339), default: 7 days ago'
        in: query
        name: from
        type: string
      - description: 'End date (RFC3339), default: now'
        in: query
        name: to
        type: string
      - description: Filter by tenant ID
        in: query
        name: tenantId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DashboardOverviewResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Get dashboard overview'
      tags:
      - Admin Dashboard
  /admin/notifications:
    get:
      consumes:
      - application/json
      description: Retrieve paginated list of all notifications with full filters
        (admin only)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: pageSize
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type
        in: query
        name: type
        type: string
      - description: Filter by channel
        in: query
        name: channel
        type: string
      - description: Filter by user ID
        in: query
        name: userId
        type: string
      - description: Filter by tenant ID
        in: query
        name: tenantId
        type: string
      - description: Search in recipient/subject/body
        in: query
        name: search
        type: string
      - description: Start date (ISO8601)
        in: query
        name: from
        type: string
      - description: End date (ISO8601)
        in: query
        name: to
        type: string
      - default: createdAt
        description: Sort field
        in: query
        name: sortBy
        type: string
      - default: desc
        description: Sort direction
        in: query
        name: sortDirection
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedNotificationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: List all notifications'
      tags:
      - Admin Notifications
    post:
      consumes:
      - application/json
      description: 'Create a new notification (admin only).\nCanonical format: {\"channel\":\"sms\",\"recipient\":{\"phone\":\"+989...\"},\"body\":\"...\"}'
      parameters:
      - description: Notification data
        in: body
        name: notification
        required: true
        schema:
          $ref: '#/definitions/dto.CreateNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.NotificationResponse'
        "400":
          description: Bad Request
